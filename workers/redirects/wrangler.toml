# Legacy WordPress query-string redirects (§5.3).
#
# No secrets, no KV — just a generated lookup table. Regenerate it with:
#   node scripts/build-worker-redirects.mjs
#
# Deploy:
#   cd workers/redirects && wrangler deploy
#
# The route is the ROOT PATH ONLY. Every legacy URL is a query string on `/`
# (/?p=941, /?page_id=2, …), so nothing else needs to pass through this Worker;
# /blog/*, /apps/* and the uploads go straight to GitHub Pages as before.

name = "redirects"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# Route patterns cannot contain a query string (the API rejects `/?*`), and a
# bare `mityjohn.com/` did not match `mityjohn.com/?p=941` in practice. So the
# route is `/*` and the Worker itself bails out immediately for any path other
# than the root — see src/index.ts. Non-root requests cost one near-zero
# passthrough rather than a lookup.
[[routes]]
pattern = "mityjohn.com/*"
zone_name = "mityjohn.com"

[[routes]]
pattern = "www.mityjohn.com/*"
zone_name = "mityjohn.com"
