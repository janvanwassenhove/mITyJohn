# §7.4 — weekly Instagram token health check. Opens an issue if the token expires
# in <14 days or the last sync is older than 72h. Should never fire in normal operation.
name: Instagram Health
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
permissions:
  contents: read
  issues: write
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check /health
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          H=$(curl -sf --max-time 20 https://ig.mityjohn.workers.dev/health) || H='{"tokenExpiresIn":null,"lastSync":null}'
          echo "health: $H"
          DAYS=$(echo "$H" | jq -r '.tokenExpiresIn // -1')
          LAST=$(echo "$H" | jq -r '.lastSync // empty')
          PROBLEM=""
          if [ "$DAYS" -lt 14 ]; then PROBLEM="Instagram token expires in ${DAYS} days."; fi
          if [ -n "$LAST" ]; then
            AGE=$(( ( $(date +%s) - $(date -d "$LAST" +%s) ) / 3600 ))
            if [ "$AGE" -gt 72 ]; then PROBLEM="$PROBLEM Last sync ${AGE}h ago."; fi
          else
            PROBLEM="$PROBLEM No lastSync recorded."
          fi
          if [ -n "$PROBLEM" ]; then
            gh issue create --title "Instagram integration needs attention" \
              --body "Weekly health check failed: $PROBLEM See MIGRATION_BRIEF.md §7." || true
          fi
