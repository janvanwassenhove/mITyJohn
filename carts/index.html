<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Carts — Vlaamse kaartspellen (wiezen, …) in de browser" />
    <title>Carts</title>
    <script>
      // Thema vóór eerste paint toepassen om een flits te vermijden (§8).
      (function () {
        try {
          var t = localStorage.getItem('carts.theme');
          var dark =
            t === 'dark' ||
            ((t === null || t === 'system') && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
