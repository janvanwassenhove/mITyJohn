<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Carts — Vlaamse kaartspellen (wiezen, …) in de browser" />
    <title>Carts</title>
    <link rel="manifest" href="/carts/manifest.webmanifest" />
    <meta name="theme-color" content="#0a6e4f" />
    <link rel="apple-touch-icon" href="/carts/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%99%A0%3C/text%3E%3C/svg%3E"
    />
    <script>
      // Thema vóór eerste paint toepassen om een flits te vermijden (§8).
      (function () {
        try {
          var t = localStorage.getItem('carts.theme');
          var dark =
            t === 'dark' ||
            ((t === null || t === 'system') && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
